name: Build APK

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build in OpenWrt SDK
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            ghcr.io/openwrt/sdk:x86-64-25.12.4 \
            bash -c "
              cp -r /workspace/. /home/build/openwrt/package/luci-app-adguardhome/
              cd /home/build/openwrt
              make defconfig
              make package/luci-app-adguardhome/compile -j\$(nproc) V=s
              find bin -name 'luci-app-adguardhome*.apk' -exec cp {} /workspace/ \;
            "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-adguardhome
          path: '*.apk'

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: '*.apk'
