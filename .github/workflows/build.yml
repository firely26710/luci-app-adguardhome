name: Build APK

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download OpenWrt SDK
        run: |
          set -e
          wget -q "https://downloads.openwrt.org/releases/25.12.0/targets/x86/64/" -O index.html
          SDK_FILE=$(grep -oP 'openwrt-sdk-25\.12\.0-x86-64[^"]*\.tar\.xz' index.html | head -1)
          if [ -z "$SDK_FILE" ]; then
            echo "=== Page content ===" && head -50 index.html
            exit 1
          fi
          echo "Found: $SDK_FILE"
          wget -q --show-progress "https://downloads.openwrt.org/releases/25.12.0/targets/x86/64/$SDK_FILE"
          tar xf "$SDK_FILE"
          mv openwrt-sdk-* sdk

      - name: Build package
        run: |
          cp -r luci-app-adguardhome sdk/package/
          cd sdk
          make defconfig
          make package/luci-app-adguardhome/compile -j$(nproc) V=s

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-adguardhome
          path: sdk/bin/packages/x86_64/packages/luci-app-adguardhome*.apk

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: sdk/bin/packages/x86_64/packages/luci-app-adguardhome*.apk
