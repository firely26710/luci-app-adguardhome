name: Build APK

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build in OpenWrt SDK
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            ghcr.io/openwrt/sdk:x86-64-25.12.4 \
            bash -c "
              set -e
              mkdir -p /builder/package/luci-app-adguardhome
              cp -r /workspace/. /builder/package/luci-app-adguardhome/
              echo '=== Package contents ==='
              ls /builder/package/luci-app-adguardhome/Makefile
              cd /builder
              make defconfig
              make package/luci-app-adguardhome/compile -j\$(nproc) V=s
              echo '=== Searching for apk ==='
              find bin -name '*.apk' 2>/dev/null || echo 'No apk found in bin/'
              ls -R bin/packages/ 2>/dev/null | head -30 || echo 'No bin/packages/'
              find bin -name 'luci-app-adguardhome*.apk' -exec cp -v {} /workspace/ \;
            "
          echo "=== Workspace after build ==="
          ls -la ${{ github.workspace }}/*.apk 2>/dev/null || echo "No apk in workspace"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-adguardhome
          path: '*.apk'

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: '*.apk'
