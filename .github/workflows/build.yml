name: Build APK

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download OpenWrt SDK
        run: |
          SDK_URL="https://downloads.openwrt.org/releases/25.12.4/targets/x86/64/"
          SDK_FILE=$(wget -qO- "$SDK_URL" | grep -oP 'openwrt-sdk-25\.12\.4-x86-64.*?\.tar\.xz' | head -1)
          echo "SDK: $SDK_FILE"
          wget -q --show-progress "${SDK_URL}${SDK_FILE}"
          tar xf "$SDK_FILE"
          mv openwrt-sdk-* sdk

      - name: Build package
        run: |
          cp -r luci-app-adguardhome sdk/package/
          cd sdk
          make defconfig
          make package/luci-app-adguardhome/compile -j$(nproc) V=s
          mkdir -p ../out
          find bin -name 'luci-app-adguardhome*.apk' -exec cp {} ../out/ \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-adguardhome
          path: out/*.apk

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.apk
